name: Android Build

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Create .env
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          if [ ! -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          fi
          if [ ! -z "$TMDB_API_KEY" ]; then
            echo "TMDB_API_KEY=${TMDB_API_KEY}" >> .env
          fi
          if [ ! -s .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Decode Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            # Use --decode and ignore garbage just in case
            base64 --decode --ignore-garbage debug.keystore.base64 > debug.keystore || true
          fi
          if [ ! -s debug.keystore ]; then
            echo "Generating new debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trackverse-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
