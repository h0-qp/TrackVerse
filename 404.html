<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>جاري الفتح في TrackVerse...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #0f172a;
            color: #f8fafc;
        }
        h2 { color: #38bdf8; }
        p { line-height: 1.6; color: #cbd5e1; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
    <script type="text/javascript">
        window.onload = function() {
            var path = window.location.pathname; 
            var intentUrl = "intent://h0-qp.github.io" + path + "#Intent;scheme=https;package=com.aistudio.trackverse.abcx;end";
            
            setTimeout(function() {
                window.location.href = intentUrl;
            }, 500);
            
            document.getElementById("open-btn").href = intentUrl;
        };
    </script>
</head>
<body>
    <h2>جاري فتح التطبيق...</h2>
    <p>المفروض التطبيق يفتح تلقائياً. إذا ما فتح، اضغط على الزر الجوه.</p>
    <a id="open-btn" href="#" class="btn">افتح في TrackVerse</a>
</body>
</html>
